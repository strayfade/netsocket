version: "3.8"
services:
  netsocket:
    image: strayfade/netsocket:latest
    container_name: netsocket
    ports:
      - 4675:4675
    environment:
      - PORT=4675
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/netsocket/data
    volumes:
      - netsocket-data:/netsocket/data
    restart: always
volumes:
  netsocket-data: