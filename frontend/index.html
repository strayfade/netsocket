<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="author" content="strayfade">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:site_name" content="Login">
    <meta property="og:url" content="Login">
    <meta name="twitter:url" content="Login">
    <meta property="og:title" content="Login">
    <meta property="twitter:title" content="Login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <title>Login</title>
</head>

<body class="login-page">
    <div class="login-bg" aria-hidden="true">
        <div class="login-bg-grid"></div>
    </div>

    <main class="login-shell">
        <div class="login-card">
            <div class="login-brand">
                <a href="/" class="login-logo-lockup" aria-label="Home">
                    <img class="login-logo" src="/favicon.png" alt="">
                    <span class="login-title" id="loginTitle">good morning</span>
                </a>
            </div>

            <form class="form">
                <div id="loginNotice" class="login-notice" hidden role="status" aria-live="polite">
                    <span id="loginNoticeText" class="login-notice-text"></span>
                    <button type="button" id="loginNoticeDismiss" class="login-notice-dismiss" aria-label="Dismiss message">×</button>
                </div>

                <div class="field">
                    <label for="username">Username</label>
                    <div class="inputForm">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                            <path d="M20 21a8 8 0 0 0-16 0"/>
                            <circle cx="12" cy="8" r="4"/>
                        </svg>
                        <input id="username" name="username" placeholder="Enter your username" class="input" type="text" autocomplete="username">
                    </div>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="inputForm">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input id="password" name="password" placeholder="Enter your password" class="input" type="password" autocomplete="current-password">
                    </div>
                </div>

                <div id="passwordConfirmRow" class="login-extra hidden">
                    <div class="field">
                        <label for="passwordConfirm">Confirm password</label>
                        <div class="inputForm">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input id="passwordConfirm" placeholder="Re-enter your password" class="input" type="password" autocomplete="new-password">
                        </div>
                    </div>
                </div>

                <div class="login-remember">
                    <label class="login-switch" for="rememberMe">
                        <input id="rememberMe" name="rememberMe" type="checkbox" class="login-switch-input" checked>
                        <span class="login-switch-track" aria-hidden="true">
                            <span class="login-switch-thumb"></span>
                        </span>
                        <span class="login-switch-label">Remember me</span>
                    </label>
                    <p class="login-remember-hint">Stay signed in after closing the browser or restarting the server.</p>
                </div>

                <button type="submit" class="button-submit" id="submitBtn">
                    <span class="button-submit-label">Sign In</span>
                </button>
            </form>
        </div>
    </main>

    <script src="/js/loginLogic.js"></script>
    <script src="/js/loginPage.js"></script>
</body>

</html>
