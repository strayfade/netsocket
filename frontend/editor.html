<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <meta property="og:site_name" content="netsocket.strayfade.com">
    <meta property="og:url" content="netsocket.strayfade.com">

    <meta property="twitter:title" content="netsocket">

    <link rel="stylesheet" type="text/css" href="litegraph-editor.css">
    <script type="text/javascript" src="litegraph.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Instrument+Serif:ital@0;1&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 18px;
        }

    <link rel="stylesheet" href="/css/editor.css">
    <title>netsocket | Editor</title>
    <style>
        body:has(#node-panel) canvas,
        body:has(#node-panel) #log,
        body:has(#node-panel) .editor-top-chrome {
            filter: brightness(50%);
        }

<body style="width: 100%; height: 100%; margin: 0;" class="litegraph litegraph-editor">
    <div class="editor-top-chrome">
        <header>
            <img src="favicon.png" alt="Netsocket Logo">
            <span class="node-count"><span id="node-count">0 nodes</span> <span id="node-count-visible">(0
                    visible)</span></span>
            <div class="header-distance"></div>
            <a href="#" id="open-settings">
                <span>Integrations</span>
                <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;">settings</span>
            </a>
            <a href="/logout">
                <span>Log Out</span>
                <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;">arrow_outward</span>
            </a>
        </header>
        <div id="editor-keybinds-bar" class="editor-keybinds-bar" hidden aria-hidden="true">
            <div class="editor-keybinds-inner" id="editor-keybinds-inner"></div>
        </div>
    </div>
    <div class="connection-banner"></div>
    <div class="wordmark">
        <img src="wordmark.png" alt="Logo Wordmark">
    </div>
    <canvas id='nodegraph'></canvas>
    <textarea id="log" spellcheck="false"></textarea>
    <script>

        LiteGraph.use_uuids = true;
        let graph = new LGraph();
        let canvas = new LGraphCanvas("#nodegraph", graph);

        // Update node counts in the header: total nodes and visible nodes
        const updateNodeCounts = () => {
            const total = graph && graph._nodes ? graph._nodes.length : 0;
            const visible = canvas && canvas.visible_nodes ? canvas.visible_nodes.length : 0;
            const totalEl = document.getElementById("node-count");
            const visibleEl = document.getElementById("node-count-visible");
            if (totalEl) totalEl.textContent = `${total} nodes`;
            if (visibleEl) visibleEl.textContent = `(${visible} visible)`;
        }

        // Call update on each canvas render (fires when moving/zooming the graph)
        canvas.onRender = () => {
            updateNodeCounts();
        }

        const keybindsBar = document.getElementById("editor-keybinds-bar");
        const keybindsInner = document.getElementById("editor-keybinds-inner");

        const appendKeybindItem = (keyLabels, actionText) => {
            const item = document.createElement("div");
            item.className = "editor-keybind-item";
            const keysEl = document.createElement("span");
            keysEl.className = "editor-keybind-keys";
            keyLabels.forEach((label, i) => {
                if (i > 0) {
                    const plus = document.createElement("span");
                    plus.className = "editor-keybind-plus";
                    plus.textContent = "+";
                    keysEl.appendChild(plus);
                }
                const kbd = document.createElement("kbd");
                kbd.className = "editor-keybind-key";
                kbd.textContent = label;
                keysEl.appendChild(kbd);
            });
            const act = document.createElement("span");
            act.className = "editor-keybind-action";
            act.textContent = actionText;
            item.appendChild(keysEl);
            item.appendChild(act);
            keybindsInner.appendChild(item);
        };

        const updateKeybindsBar = (selected) => {
            const sel = selected && typeof selected === "object" ? selected : {};
            const n = Object.keys(sel).length;
            if (!keybindsBar || !keybindsInner) return;
            keybindsInner.innerHTML = "";
            if (n < 0) {
                keybindsBar.hidden = true;
                keybindsBar.setAttribute("aria-hidden", "true");
                return;
            }
            keybindsBar.hidden = false;
            keybindsBar.setAttribute("aria-hidden", "false");
            const selectionSummary = document.createElement("p");
            selectionSummary.className = "editor-keybinds-selection-summary";
            selectionSummary.textContent =
                n === 1 ? "1 node selected" : `${n} nodes selected`;
            keybindsInner.appendChild(selectionSummary);
            if (n === 0) {
                appendKeybindItem(["Right-click"], "Add Nodes");
            }
            if (n > 0) {
                appendKeybindItem(["Double-click"], "Set Inputs");
                appendKeybindItem(["Right-click"], "Copy node ID (menu)");
                appendKeybindItem(["Alt", "Drag"], "Clone");
                appendKeybindItem(["Shift"], "Multiselect");
                appendKeybindItem(["CTRL", "C"], "Copy");
                appendKeybindItem(["CTRL", "V"], "Paste");
            }
            if (n > 1) {
                appendKeybindItem(["Shift", "Drag"], "Move Nodes");
            }
        };

        canvas.onSelectionChange = (selected) => {
            updateKeybindsBar(selected);
        };
        updateKeybindsBar(canvas.selected_nodes);

        // Also update counts immediately
        updateNodeCounts();
        // Update counts when nodes are added/removed from the graph
        if (graph) {
            graph.onNodeAdded = () => updateNodeCounts();
            graph.onNodeRemoved = () => updateNodeCounts();
        }
        const setConnected = (connected = true) => {
            let banner = document.getElementsByClassName("connection-banner")[0]
            banner.style.background = connected ? "lime" : "red"
            banner.style.padding = connected ? "0px 10px" : "4px 10px"
            banner.textContent = connected ? "" : "Disconnected"
        }

        let activeWs = null;
        let wsConnectAbort = null;
        let reconnectTimerId = null;
        let wsRequestSeq = 0;
        const wsPendingRequests = {}
        let graphLoaded = false;
        /** True while applying server graph state — suppresses autosave during LGraph.configure (clear/add call change). */
        let graphReconfiguring = false;

        const wsUrl = () => `${location.protocol !== 'https:' ? "ws" : "wss"}://${window.location.host}`;

        const clearWsReconnectTimer = () => {
            if (reconnectTimerId != null) {
                clearTimeout(reconnectTimerId);
                reconnectTimerId = null;
            }
        };

        /** Drop listeners and close any in-flight socket so only one WebSocket exists at a time. */
        const disposeCurrentWebSocket = () => {
            if (wsConnectAbort) {
                wsConnectAbort.abort();
                wsConnectAbort = null;
            }
            const w = activeWs;
            activeWs = null;
            if (w && (w.readyState === WebSocket.CONNECTING || w.readyState === WebSocket.OPEN)) {
                try {
                    w.close(1000, "reconnect");
                } catch (e) { /* ignore */ }
            }
        };

        const scheduleWsReconnect = () => {
            clearWsReconnectTimer();
            reconnectTimerId = setTimeout(() => {
                reconnectTimerId = null;
                connectWebSocket();
            }, 1000);
        };

        const sendWsRequest = async (payload) => {
            while (!activeWs || activeWs.readyState !== WebSocket.OPEN) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            const requestId = `${Date.now()}-${++wsRequestSeq}`
            payload.requestId = requestId
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    delete wsPendingRequests[requestId]
                    reject(new Error('Websocket request timeout'))
                }, 5000)
                wsPendingRequests[requestId] = { resolve, reject, timeout }
                activeWs.send(JSON.stringify(payload))
            })
        }

        const scrollToBottom = () => {
            log.scrollTop = log.scrollHeight;
        };
        log.addEventListener("mouseleave", async () => {
            await new Promise(resolve => setTimeout(resolve, 1));
            scrollToBottom();
        });

        const connectWebSocket = () => {
            clearWsReconnectTimer();
            disposeCurrentWebSocket();

            wsConnectAbort = new AbortController();
            const { signal } = wsConnectAbort;
            const ws = new WebSocket(wsUrl());
            activeWs = ws;

            ws.addEventListener("open", () => {
                if (activeWs !== ws) return;
                setConnected(true);
                ws.send(JSON.stringify({
                    broadcastPurpose: "populateLog"
                }));
            }, { signal });

            ws.addEventListener("close", () => {
                if (activeWs !== ws) return;
                activeWs = null;
                setConnected(false);
                scheduleWsReconnect();
            }, { signal });

            ws.addEventListener("message", async (event) => {
                if (activeWs !== ws) return;
                const message = event.data;
                const parsedMessage = JSON.parse(message);
                if (parsedMessage?.requestId && wsPendingRequests[parsedMessage.requestId]) {
                    const { resolve, timeout } = wsPendingRequests[parsedMessage.requestId]
                    clearTimeout(timeout)
                    delete wsPendingRequests[parsedMessage.requestId]
                    resolve(parsedMessage)
                    return
                }
                switch (parsedMessage.broadcastPurpose) {
                    case "setNodes":
                        graphReconfiguring = true;
                        try {
                            graph.configure(parsedMessage.broadcastData);
                            graph.start();
                            graphLoaded = true;
                            // update header counts after loading the graph
                            try { updateNodeCounts(); } catch (e) { /* ignore */ }
                        } finally {
                            graphReconfiguring = false;
                        }
                        break;
                    case "populateLog":
                        log.innerHTML = (() => {
                            let newText = ""
                            for (i of parsedMessage.broadcastData)
                                newText += `\n${i}`
                            newText = newText.trim().replace(/(^\s*(?!.+)\n+)|(\n+\s+(?!.+)$)/g, "").trim();
                            return newText
                        })()
                        scrollToBottom()
                        break;
                    case "newLogLine":
                        log.innerHTML = log.innerHTML + `\n${parsedMessage.broadcastData}`
                        scrollToBottom()
                        break;
                }
            }, { signal });
        };
        connectWebSocket();

        // On resize
        let lastSize = []
        nodegraph.style.width = "100vw";
        nodegraph.style.height = "100vh";
        const resize = () => {
            lastSize = [
                window.innerWidth, window.innerHeight
            ];
            const dpr = window.devicePixelRatio || 1;
            // Use LGraphCanvas.resize so bgcanvas stays in sync and setDirty triggers a full redraw
            // (setting canvas width/height alone clears the bitmap without marking dirty).
            canvas.resize(lastSize[0] * dpr, lastSize[1] * dpr);
        }
        const detectResizeNeeded = () => {
            let currentSize = [
                window.innerWidth, window.innerHeight
            ]
            if (currentSize[0] != lastSize[0] || currentSize[1] != lastSize[1]) {
                resize()
            }
        }
        setInterval(detectResizeNeeded, 6)
        detectResizeNeeded()

        async function loadGraph() {
            while (!activeWs || activeWs.readyState !== WebSocket.OPEN) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            await activeWs.send(JSON.stringify({
                broadcastPurpose: 'getNodes'
            }));
        }
        loadGraph()
        const saveGraph = async () => {
            if (!graphLoaded || graphReconfiguring) {
                return;
            }
            while (!activeWs || activeWs.readyState !== WebSocket.OPEN) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            await activeWs.send(JSON.stringify({
                broadcastPurpose: 'setNodes',
                broadcastData: graph.serialize()
            }));
        }
        graph.on_change = saveGraph

        const ping = async () => {
            if (activeWs && activeWs.readyState == WebSocket.OPEN) {
                await activeWs.send(JSON.stringify({
                    broadcastPurpose: 'ping',
                    broadcastData: Date.now()
                }))
            }
        }
        setInterval(ping, 3000);
    </script>
    <!-- Settings modal (sidebar + panels built from server preference registry) -->
    <div id="settings-modal" style="display:none; position:fixed; inset:0; z-index:50;">
        <div id="settings-backdrop" class="settings-backdrop" aria-hidden="true"></div>
        <div class="settings-shell" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
            <div id="settings-sidebar">
                <div class="settings-sidebar-top">
                    <span type="button" id="close-settings" class="settings-close-btn">
                        <span class="material-symbols-outlined">
                            close
                        </span>
                    </span>
                </div>
                <div id="settings-tabs-container"></div>
            </div>
            <div id="settings-content">
                <span id="settings-modal-title" class="visually-hidden">Application settings</span>
                <div id="settings-panels-scroll"></div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openSettingsBtn = document.getElementById('open-settings')
            const settingsModal = document.getElementById('settings-modal')
            const closeSettingsBtn = document.getElementById('close-settings')
            const settingsBackdrop = document.getElementById('settings-backdrop')
            const tabsContainerEl = document.getElementById('settings-tabs-container')
            const panelsScrollEl = document.getElementById('settings-panels-scroll')

            const appendDescription = (field, pref) => {
                const raw = pref.description
                if (raw == null || !String(raw).trim()) return
                const wrap = document.createElement('div')
                wrap.className = 'settings-field-description'
                wrap.innerHTML = String(raw)
                field.appendChild(wrap)
            }

            const buildFieldRow = (pref) => {
                const field = document.createElement('div')
                field.className = 'settings-field'

                const readValue = (control) => {
                    if (pref.type === 'boolean') return control.checked ? 'true' : 'false'
                    return control.value
                }

                if (pref.type === 'boolean') {
                    const title = document.createElement('div')
                    title.className = 'settings-label-block'
                    title.textContent = pref.displayName
                    field.appendChild(title)
                    appendDescription(field, pref)

                    const row = document.createElement('label')
                    row.className = 'settings-field-row'
                    const cb = document.createElement('input')
                    cb.type = 'checkbox'
                    cb.checked = pref.value === true || pref.value === 'true'
                    const span = document.createElement('span')
                    span.textContent = 'Enabled'
                    row.appendChild(cb)
                    row.appendChild(span)
                    field.appendChild(row)

                    const btnRow = document.createElement('div')
                    btnRow.className = 'settings-field-row'
                    btnRow.style.marginTop = '8px'
                    const saveBtn = document.createElement('button')
                    saveBtn.type = 'button'
                    saveBtn.textContent = 'Save'
                    btnRow.appendChild(saveBtn)
                    field.appendChild(btnRow)

                    saveBtn.addEventListener('click', async () => {
                        try {
                            await sendWsRequest({
                                broadcastPurpose: 'saveSetting',
                                broadcastData: { name: pref.id, value: readValue(cb) }
                            })
                            saveBtn.textContent = 'Saved'
                            setTimeout(() => { saveBtn.textContent = 'Save' }, 1400)
                        } catch (err) {
                            console.warn('Save failed', err)
                        }
                    })
                    return field
                }

                const lab = document.createElement('label')
                lab.className = 'settings-label-block'
                lab.textContent = pref.displayName
                field.appendChild(lab)
                appendDescription(field, pref)

                const row = document.createElement('div')
                row.className = 'settings-field-row'
                let control
                if (pref.type === 'number') {
                    control = document.createElement('input')
                    control.type = 'number'
                    control.value = pref.value != null ? String(pref.value) : ''
                } else {
                    control = document.createElement('input')
                    control.type = 'text'
                    control.value = pref.value != null ? String(pref.value) : ''
                }
                const saveBtn = document.createElement('button')
                saveBtn.type = 'button'
                saveBtn.textContent = 'Save'
                row.appendChild(control)
                row.appendChild(saveBtn)
                field.appendChild(row)

                saveBtn.addEventListener('click', async () => {
                    try {
                        await sendWsRequest({
                            broadcastPurpose: 'saveSetting',
                            broadcastData: { name: pref.id, value: readValue(control) }
                        })
                        saveBtn.textContent = 'Saved'
                        setTimeout(() => { saveBtn.textContent = 'Save' }, 1400)
                    } catch (err) {
                        console.warn('Save failed', err)
                    }
                })
                return field
            }

            const renderPreferences = (list) => {
                tabsContainerEl.innerHTML = ''
                panelsScrollEl.innerHTML = ''
                const prefs = Array.isArray(list) ? list : []
                const byCat = {}
                for (const p of prefs) {
                    const c = p.category || 'Other'
                    if (!byCat[c]) byCat[c] = []
                    byCat[c].push(p)
                }
                const categories = Object.keys(byCat).sort((a, b) => a.localeCompare(b))

                const panels = []
                const tabs = []

                const showTab = (index) => {
                    tabs.forEach((t, i) => t.classList.toggle('settings-tab-active', i === index))
                    panels.forEach((p, i) => { p.style.display = i === index ? '' : 'none' })
                }

                categories.forEach((cat, idx) => {
                    const tab = document.createElement('div')
                    tab.className = 'settings-tab' + (idx === 0 ? ' settings-tab-active' : '')
                    tab.textContent = cat
                    tab.addEventListener('click', () => showTab(idx))
                    tabsContainerEl.appendChild(tab)
                    tabs.push(tab)

                    const panel = document.createElement('div')
                    panel.className = 'settings-panel'
                    panel.style.display = idx === 0 ? '' : 'none'
                    //const h = document.createElement('h3')
                    //h.textContent = cat
                    //panel.appendChild(h)
                    //const sep = document.createElement('span')
                    //sep.className = 'separator'
                    //sep.setAttribute('aria-hidden', 'true')
                    //panel.appendChild(sep)
                    for (const pref of byCat[cat]) {
                        panel.appendChild(buildFieldRow(pref))
                    }
                    panelsScrollEl.appendChild(panel)
                    panels.push(panel)
                })

                if (!categories.length) {
                    const empty = document.createElement('p')
                    empty.style.color = '#666'
                    empty.style.fontSize = '13px'
                    empty.textContent = 'No settings are registered by the loaded nodes.'
                    panelsScrollEl.appendChild(empty)
                }
            }

            openSettingsBtn.addEventListener('click', async (e) => {
                e.preventDefault()
                settingsModal.style.display = 'block'
                try {
                    const response = await sendWsRequest({ broadcastPurpose: 'getPreferences' })
                    renderPreferences(response.broadcastData)
                } catch (err) {
                    console.warn('Failed to load preferences', err)
                    renderPreferences([])
                }
            })

            const closeSettingsModal = () => { settingsModal.style.display = 'none' }

            if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', closeSettingsModal)
            if (settingsBackdrop) settingsBackdrop.addEventListener('click', closeSettingsModal)
        })
    </script>
    <script type="text/javascript" src="createNode.js"></script>
    <script type="text/javascript" src="constructNodes.js"></script>
</body>
